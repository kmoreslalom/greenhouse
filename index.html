<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Welcome</title>
    <style>
        body {
            background: #fff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Helvetica, Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .greenhouse-img {
            max-width: 400px;
            width: 100%;
            height: auto;
            margin-bottom: 32px;
        }
        .welcome-text {
            color: #000;
            font-size: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="greenhouse.jpg" alt="Greenhouse" class="greenhouse-img">
        <div class="welcome-text">hello welcome to the greenhouse</div>
    </div>
</body>
</html>
